# PlusClouds Agent v2 Configuration
#
# This file is the primary source of identity for the agent. In production it
# is written by the platform during VM provisioning (via the ISO config drive)
# and the ISO is unmounted before the agent starts. All values here can also be
# overridden by environment variables (prefix: PLUSCLOUDS_AGENT_).

nats:
  # Transport: "nats" (TCP) or "websocket" (wss://, no client certificates needed).
  connection_type: websocket

  # Used when connection_type is "nats".
  url: nats://nats.plusclouds.com:4222

  # Used when connection_type is "websocket".
  websocket_url: wss://nats.plusclouds.com:443

  # VM UUID — written here by the platform during provisioning.
  # Used as the NATS username for authentication.
  # Override via env: PLUSCLOUDS_AGENT_NATS_AGENT_UUID
  agent_uuid: "d6199047-322a-4845-bdea-1d44dd1b49e5"

  # Agent API key — written here by the platform during provisioning.
  # Used as the NATS password for authentication.
  # Override via env: PLUSCLOUDS_AGENT_NATS_API_KEY
  api_key: "7Qic72PeIToUWqdiIEcfPxwgVBuNNcLRBjGxuoGEJefeu92NTqanK72JlBeeXBJ3"

  # -1 = unlimited reconnect attempts
  max_reconnects: -1
  reconnect_wait: 5s

agent:
  heartbeat_interval: 30s
  telemetry_interval: 30s

  # Operations this agent is permitted to execute.
  # Remove any entry to disable that operation — the platform will receive a
  # "rejected" result instead of being able to run it.
  allowed_operations:
    - agent.allowed_operations
    - services.list
    - services.get
    - services.start
    - services.stop
    - services.restart
    - services.reload
    - services.enable
    - services.disable
    - system.info
    - system.metrics
    - system.cpu
    - system.memory
    - system.disk
    - system.network
    - system.update
    - telemetry.set_interval
    # Uncomment to allow arbitrary command execution (see allowed_commands below)
    - exec
    # - vm.reboot
    # - vm.shutdown

  # When "exec" is listed above, only these exact binary paths may be invoked.
  # Requests referencing unlisted paths are rejected.
  allowed_commands:
    - /usr/bin/journalctl
    - /usr/bin/df
    - /usr/bin/free
    - /usr/bin/ls

iso:
  # Mount path checked at startup. In production the ISO is unmounted before
  # the agent starts, so this is a silent best-effort check. If the ISO is
  # present and carries a vm_id, it overrides the values above.
  mount_path: /media/plusclouds-config

log:
  # Log level: debug, info, warn, error
  level: debug
  # Log format for stdout: json or console
  format: console
  # Optional path to write logs to in addition to stdout (always JSON).
  # Directory is created automatically. Leave empty to disable.
  file: /var/log/plusclouds/agent.log

autoheal:
  enabled: true
  restart_delay: 10s
